<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Seymour — Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container { max-width: 420px; width: 100%; }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .header img { width: 32px; height: 32px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }
    label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15); }
    button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .connected-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #dcfce7;
      border-radius: 6px;
      font-size: 12px;
      color: #166534;
      margin-bottom: 12px;
    }
    .connected-info .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
    .actions { display: flex; gap: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon-48.png" alt="Seymour" />
      <h1>Seymour Settings</h1>
    </div>

    <!-- Connection config -->
    <div class="card">
      <h2>Server Connection</h2>

      <div id="connected-state" class="hidden">
        <div class="connected-info">
          <span class="dot"></span>
          <span>Connected as <strong id="connected-email"></strong></span>
        </div>
        <div id="current-urls" style="font-size: 12px; color: #6b7280; margin-bottom: 12px;"></div>
        <button class="btn-danger" id="logout-btn">Disconnect</button>
      </div>

      <div id="login-state">
        <label for="backend-url">Backend API URL</label>
        <input type="url" id="backend-url" placeholder="http://localhost:3001" />

        <label for="webapp-url">Web App URL</label>
        <input type="url" id="webapp-url" placeholder="http://localhost:8080" />

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" />

        <div class="actions">
          <button class="btn-primary" id="login-btn">Connect</button>
        </div>
        <div id="login-status" class="hidden status"></div>
      </div>
    </div>

    <div class="card">
      <h2>Polling</h2>
      <p style="font-size: 12px; color: #6b7280;">
        Unread count and articles are refreshed every 2 minutes automatically.
      </p>
      <button class="btn-secondary" id="refresh-btn" style="margin-top: 8px;">Refresh Now</button>
      <div id="refresh-status" class="hidden status"></div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
