<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f9fafb;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
    }
    header img { width: 22px; height: 22px; }
    header h1 { font-size: 14px; font-weight: 700; flex: 1; }
    .badge {
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 9999px;
      font-weight: 600;
    }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      padding: 4px;
    }
    .settings-btn:hover { color: #374151; }

    #status {
      padding: 32px 16px;
      text-align: center;
      color: #9ca3af;
    }
    #status a {
      color: #2563eb;
      text-decoration: none;
      cursor: pointer;
    }
    #status a:hover { text-decoration: underline; }

    #articles { overflow-y: auto; max-height: 460px; }
    .article {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .article:hover { background: #eff6ff; }
    .unread-dot {
      width: 7px;
      height: 7px;
      background: #2563eb;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .article-body { flex: 1; min-width: 0; }
    .article-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 2px;
      display: flex;
      gap: 6px;
    }
    .article-meta span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .article-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon-48.png" alt="Seymour" />
    <h1>Seymour</h1>
    <span id="count-badge" class="badge" style="display:none"></span>
    <button class="settings-btn" id="settings-btn" title="Settings">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </header>
  <div id="status"></div>
  <div id="articles"></div>
  <script src="popup.js"></script>
</body>
</html>
